name: IaC

on:
  workflow_call:
    inputs:
      artifact_name:
        description: "Plan to scan"
        required: true
        type: string
      environment:
        description: "Plan location"
        required: true
        type: string


jobs:
  trivy:
    name: Trivy scan (${{ inputs.environment }})
    runs-on: ubuntu-22.04

    container:
      image: aquasec/trivy:0.70.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: trivy-input

      - name: Validate downloaded plan artifact
        run: |
          find trivy-input -maxdepth 3 -type f -print
          test -f trivy-input/tfplan.json

      - name: Run Trivy on Terraform plan
        run: |
          trivy config \
            --format sarif \
            --output trivy_tfplan.sarif \
            trivy-input/tfplan

      - name: Run Trivy on Terraform source
        run: |
          trivy config \
            --format sarif \
            --output trivy_terraform.sarif \
            environments/${{ inputs.environment }}

      - name: Upload Trivy SARIF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ inputs.environment }}
          path: |
            trivy_tfplan.sarif
            trivy_terraform.sarif
          if-no-files-found: error

      - name: Upload Terraform plan SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy_tfplan.sarif
          category: trivy-tfplan-${{ inputs.environment }}

      - name: Upload Terraform source SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy_terraform.sarif
          category: trivy-terraform-${{ inputs.environment }}

  checkov:
    defaults:
      run:
        working-directory: environments/${{ inputs.environment }}
    runs-on: ubuntu-22.04
    container:
      image: bridgecrew/checkov@sha256:f4c7c5bde21df03432ca8d9d1305ffe21b7205ea752c3d4e65559abae67ead4a
    steps:
      - uses: actions/checkout@v4

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: environments/${{ inputs.environment }}

      - name: debug
        run: |
          ls

      - name: Run Checkov on Terraform plan
        working-directory: environments/${{ inputs.environment }}
        run: |
          checkov \
            -f tfplan.json \
            --repo-root-for-plan-enrichment . \
            --deep-analysis \
            -o sarif \
            --output-file-path checkov-plan.sarif \
            --soft-fail

      - name: Run Checkov on Terraform files
        working-directory: environments/${{ inputs.environment }}
        run: |
          checkov \
            -d . \
            --skip-path tfplan.json \
            -o sarif \
            --output-file-path checkov-terraform.sarif \
            --soft-fail

      - name: debug
        run: |
          ls
          ls checkov-plan.sarif
          ls checkov-terraform.sarif

      - name: Upload Checkov plan SARIF
        uses: actions/upload-artifact@v4
        with:
          name: checkov-plan-results
          path: environments/${{ inputs.environment }}/checkov-plan.sarif

      - name: Upload Checkov SARIF
        uses: actions/upload-artifact@v4
        with:
          name: checkov-terraform-results
          path: environments/${{ inputs.environment }}/checkov-terraform.sarif

      - name: Upload Checkov plan SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: environments/${{ inputs.environment }}/checkov-plan.sarif
          category: checkov-plan

      - name: Upload Checkov Terraform SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: environments/${{ inputs.environment }}/checkov-terraform.sarif
          category: checkov-terraform


  opa:
    needs: [ trivy, checkov ]
    runs-on: ubuntu-22.04
    container:
      image: openpolicyagent/conftest:v0.59.0
    steps:
      - uses: actions/checkout@v4

      - name: Download SARIF artifacts
        uses: actions/download-artifact@v4

      - name: Show downloaded artifacts
        run: find . -maxdepth 4 -type f -print

      - name: Verify Trivy plan findings
        run: |
          conftest test \
            trivy-results-${{ inputs.environment }}/trivy_tfplan.sarif \
            --parser json \
            --policy policy/trivy.rego

      - name: Verify Trivy Terraform findings
        run: |
          conftest test \
            trivy-results-${{ inputs.environment }}/trivy_terraform.sarif \
            --parser json \
            --policy policy/trivy.rego
