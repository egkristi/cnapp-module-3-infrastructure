name: Terraform apply

on:
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - ".github/workflows/*.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  apply-dev:
    name: Terraform apply dev
    if: github.event_name == 'push' || inputs.environment == 'dev'
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: environments/dev

    env:
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ vars.LOCATION }}
      TF_VAR_tenant_id: ${{ vars.AZURE_TENANT_ID }}
      TF_VAR_key_vault_name: ${{ vars.KEY_VAULT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false

  plan-prod:
    name: Terraform plan prod
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    uses: ./.github/workflows/terraform-plan-reusable.yml
    with:
      environment: prod
      artifact_name: tfplan

  apply-prod:
    name: Terraform apply prod
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    runs-on: ubuntu-latest
    needs: plan-prod
    environment: prod

    defaults:
      run:
        working-directory: environments/prod

    env:
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ vars.LOCATION }}
      TF_VAR_tenant_id: ${{ vars.AZURE_TENANT_ID }}
      TF_VAR_key_vault_name: ${{ vars.KEY_VAULT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        run: terraform init -input=false

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: environments/prod

      - name: Show approved Terraform plan
        run: terraform show -no-color tfplan

      - name: Terraform apply approved plan
        run: terraform apply -input=false tfplan
